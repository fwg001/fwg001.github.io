const SUPABASE_URL = "https://ipobjafwifquhagvalaf.supabase.co";
const SUPABASE_KEY = "sb_publishable_TahjTRUV4DSvdwwcbe6G6g_drXqlRF-";

async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    ...options,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": options.prefer || "return=representation",
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error("Supabase error: " + err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// Build in-memory appState shape from Supabase rows
function buildAppState(mealRows, claimRows) {
  // Meals: start from defaults, overlay DB rows
  const meals = Object.fromEntries(MEALS.map(m => [
    m.id,
    {
      chef: m.defaultChef ? { name: m.defaultChef, phone: "seed" } : null,
      helper: m.defaultHelper ? { name: m.defaultHelper, phone: "seed" } : null,
      menu: m.menu,
    }
  ]));
  mealRows.forEach(row => {
    meals[row.meal_id] = {
      chef: row.chef_name ? { name: row.chef_name, phone: row.chef_phone } : null,
      helper: row.helper_name ? { name: row.helper_name, phone: row.helper_phone } : null,
      menu: row.menu || "",
    };
  });

  // Claims: group by gear_id
  const claims = {};
  claimRows.forEach(row => {
    if (!claims[row.gear_id]) claims[row.gear_id] = [];
    claims[row.gear_id].push({ name: row.user_name, phone: row.user_phone });
  });

  return { meals, claims };
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function formatPhone(raw) {
  const d = raw.replace(/\D/g, "");
  if (d.length <= 3) return d;
  if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
  return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6,10)}`;
}

function exportCSV(mealState, claimState, gearList) {
  const rows = [];
  rows.push(["=== ROSTER ==="]);
  rows.push(["Name", "Phone", "Status", "Adults/Teens", "Kids"]);
  ROSTER.forEach(r => rows.push([r.name, r.phone, r.status, r.adults, r.kids]));
  rows.push([]);
  rows.push(["=== MEALS ==="]);
  rows.push(["Meal", "Chef", "Helper", "Menu"]);
  MEALS.forEach(m => {
    const s = mealState[m.id];
    rows.push([m.label, s?.chef?.name || "", s?.helper?.name || "", s?.menu || ""]);
  });
  rows.push([]);
  rows.push(["=== GROUP GEAR CLAIMS ==="]);
  rows.push(["Item", "Claimed By"]);
  gearList.forEach(g => rows.push([g.item, (claimState[g.id]||[]).map(c=>c.name).join(", ") || "Unclaimed"]));

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "sunset-beach-camp.csv"; a.click();
  URL.revokeObjectURL(url);
}

                  </div>
                  <span className="tag tag-ocean">
                    {gearList.filter(g => (appState.claims[g.id]||[]).length > 0).length}/{gearList.length} covered
                  </span>
                </div>
                {gearList.map((g, i) => {
                  const claimers = appState.claims[g.id] || [];
                  const isMine = claimers.some(c => c.phone === currentUser.phone);
                  return (
                    <div key={g.id} style={{ padding: "11px 16px", borderBottom: i < gearList.length-1 ? "1px solid var(--border)" : "none", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)" }}>{g.item}</div>
                        {claimers.length > 0 && (
                          <div style={{ marginTop: 4, display: "flex", flexWrap: "wrap", gap: 4 }}>
                            {claimers.map(c => (
                              <span key={c.phone} style={{
                                display: "inline-block", fontSize: 14, fontWeight: 600,
                                background: c.phone === currentUser.phone ? "var(--pine)" : "#e8f4ea",
                                color: c.phone === currentUser.phone ? "white" : "var(--pine)",
                                borderRadius: 20, padding: "2px 8px",
                              }}>✓ {c.name}</span>
                            ))}
                          </div>
                        )}
                      </div>
                      <button className="btn" onClick={() => handleClaim(g.id)} style={{
                        padding: "6px 12px", fontSize: 14, flexShrink: 0, marginTop: 2,
                        background: isMine ? "var(--pine)" : "transparent",
                        border: isMine ? "none" : "1.5px solid var(--border)",
                        color: isMine ? "white" : "var(--ocean)",
                      }}>
                        {isMine ? "Claimed ✓" : "+ Claim"}
                      </button>
                    </div>
                  );
                })}
              </div>

              {/* Personal gear */}
              <div className="card">
                <div style={{ padding: "14px 16px 10px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div className="display" style={{ fontSize: 16, fontWeight: 600 }}>🎒 Bring Your Own</div>
                    <div style={{ fontSize: 14, color: "var(--muted)", marginTop: 2 }}>Tap items to check them off</div>
                  </div>
                  <span className="tag tag-pine">
                    {gearListPersonal.filter(item => personalChecks[item]).length}/{gearListPersonal.length}
                  </span>
                </div>
                {gearListPersonal.map((item, i) => {
                  const checked = !!personalChecks[item];
                  return (
                    <div key={item} onClick={() => toggleCheck(item)} style={{
                      padding: "11px 16px",
                      borderBottom: i < PERSONAL_GEAR.length-1 ? "1px solid var(--border)" : "none",
                      display: "flex", gap: 12, alignItems: "center",
                      cursor: "pointer",
                      background: checked ? "#f4faf4" : "white",
                      transition: "background 0.15s",
                    }}>
                      <div style={{
                        width: 20, height: 20, borderRadius: 5, flexShrink: 0,
                        border: checked ? "none" : "2px solid #c0d0c0",
                        background: checked ? "var(--pine)" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        transition: "all 0.15s",
                      }}>
                        {checked && <span style={{ color: "white", fontSize: 14, lineHeight: 1 }}>✓</span>}
                      </div>
                      <span style={{
                        fontSize: 14,
                        color: checked ? "var(--muted)" : "var(--text)",
                        textDecoration: checked ? "line-through" : "none",
                        transition: "all 0.15s",
                      }}>{item}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── PAGE 5: ADMIN ── */}
          {page === 5 && currentUser?.admin && (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div className="display" style={{ fontSize: 18, fontWeight: 600 }}>Admin Dashboard</div>
                <button className="btn btn-pine" onClick={() => exportCSV(appState.meals, appState.claims, gearList)} style={{ fontSize: 14 }}>
                  ⬇ Export CSV
                </button>
              </div>

              {/* Full roster with phones */}
              <div className="card">
                <div style={{ padding: "12px 16px 10px", borderBottom: "1px solid var(--border)" }}>
                  <div className="display" style={{ fontSize: 15, fontWeight: 600 }}>Full Roster</div>
                </div>
                {ROSTER.filter(r=>r.status==="confirmed").map((r, i, arr) => (
                  <div key={r.phone} style={{ padding: "10px 16px", borderBottom: i < arr.length-1 ? "1px solid var(--border)" : "none" }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{r.name} {r.admin ? "⭐" : ""}</div>
                      <span className="tag tag-ocean">{r.adults + r.kids} ppl</span>
                    </div>
                    <div style={{ fontSize: 14, color: "var(--muted)", marginTop: 2 }}>
                      📱 {formatPhone(r.phone)} · {r.adults} adult{r.adults!==1?"s":""}, {r.kids} kid{r.kids!==1?"s":""}
                    </div>
                  </div>
                ))}
              </div>

              {/* All meal signups */}
              <div className="card">
                <div style={{ padding: "12px 16px 10px", borderBottom: "1px solid var(--border)" }}>
                  <div className="display" style={{ fontSize: 15, fontWeight: 600 }}>Meal Sign-ups</div>
                </div>
                {MEALS.map((m, i) => {
                  const slot = appState.meals[m.id];
                  return (
                    <div key={m.id} style={{ padding: "10px 16px", borderBottom: i < MEALS.length-1 ? "1px solid var(--border)" : "none" }}>
                      <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>{m.icon} {m.label}</div>
                      <div style={{ display: "flex", gap: 16 }}>
                        <div style={{ fontSize: 14 }}>
                          <span style={{ color: "var(--muted)" }}>Chef: </span>
                          <span style={{ color: slot?.chef ? "var(--pine)" : "var(--muted)", fontStyle: slot?.chef ? "normal" : "italic" }}>
                            {slot?.chef?.name || "—"}
                          </span>
                        </div>
                        <div style={{ fontSize: 14 }}>
                          <span style={{ color: "var(--muted)" }}>Helper: </span>
                          <span style={{ color: slot?.helper ? "var(--pine)" : "var(--muted)", fontStyle: slot?.helper ? "normal" : "italic" }}>
                            {slot?.helper?.name || "—"}
                          </span>
                        </div>
                      </div>
                      {slot?.menu && <div style={{ fontSize: 14, color: "var(--sunset)", marginTop: 3 }}>🍽 {slot.menu}</div>}
                    </div>
                  );
                })}
              </div>

              {/* Shared Gear — editable */}
              <div className="card">
                <div style={{ padding: "12px 16px 10px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div className="display" style={{ fontSize: 15, fontWeight: 600 }}>🏕️ Shared Gear List</div>
                  <span className="tag tag-pine">{gearList.filter(g=>(appState.claims[g.id]||[]).length>0).length}/{gearList.length} claimed</span>
                </div>
                {gearList.map((g, i) => {
                  const claimers = appState.claims[g.id] || [];
                  const isEditing = editingGear?.type === "group" && editingGear?.id === g.id;
                  return (
                    <div key={g.id} style={{ padding: "9px 16px", borderBottom: i < gearList.length-1 ? "1px solid var(--border)" : "none" }}>
                      {isEditing ? (
                        <div style={{ display: "flex", gap: 6 }}>
                          <input
                            value={editingGear.value}
                            onChange={e => setEditingGear(prev => ({ ...prev, value: e.target.value }))}
                            style={{ flex: 1, background: "#f5f0e8", border: "1px solid var(--border)", borderRadius: 6, padding: "6px 10px", fontSize: 14 }}
                            autoFocus
                          />
                          <button className="btn btn-pine" style={{ padding: "6px 10px", fontSize: 14 }} onClick={() => {
                            const updated = gearList.map(x => x.id === g.id ? { ...x, item: editingGear.value } : x);
                            saveGearList(updated, gearListPersonal);
                            setEditingGear(null);
                          }}>Save</button>
                          <button className="btn btn-ghost" style={{ padding: "6px 10px", fontSize: 14 }} onClick={() => setEditingGear(null)}>✕</button>
                        </div>
                      ) : (
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                          <div>
                            <div style={{ fontSize: 14, fontWeight: 600 }}>{g.item}</div>
                            {claimers.length > 0 && (
                              <div style={{ fontSize: 14, color: "var(--pine)", marginTop: 2 }}>
                                {claimers.map(c => c.name).join(", ")}
                              </div>
                            )}
                            {claimers.length === 0 && <div style={{ fontSize: 14, color: "var(--muted)", fontStyle: "italic" }}>Unclaimed</div>}
                          </div>
                          <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                            <button className="btn btn-ghost" style={{ padding: "4px 10px", fontSize: 14 }}
                              onClick={() => setEditingGear({ type: "group", id: g.id, value: g.item })}>Edit</button>
                            <button className="btn" style={{ padding: "4px 10px", fontSize: 14, background: "#fde8e8", border: "1px solid #f0b0b0", color: "#9a2020" }}
                              onClick={() => {
                                if (!window.confirm(`Remove "${g.item}" from the gear list?`)) return;
                                const updated = gearList.filter(x => x.id !== g.id);
                                saveGearList(updated, gearListPersonal);
                              }}>✕</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {/* Add new group item */}
                <div style={{ padding: "10px 16px", borderTop: "1px solid var(--border)", display: "flex", gap: 6 }}>
                  <input
                    value={newGearInput.group}
                    onChange={e => setNewGearInput(prev => ({ ...prev, group: e.target.value }))}
                    placeholder="Add group item…"
                    style={{ flex: 1, background: "#f5f0e8", border: "1px solid var(--border)", borderRadius: 6, padding: "7px 10px", fontSize: 14 }}
                    onKeyDown={e => {
                      if (e.key === "Enter" && newGearInput.group.trim()) {
                        const id = "custom-" + Date.now();
                        saveGearList([...gearList, { id, item: newGearInput.group.trim(), defaultClaimers: [] }], gearListPersonal);
                        setNewGearInput(prev => ({ ...prev, group: "" }));
                      }
                    }}
                  />
                  <button className="btn btn-pine" style={{ padding: "7px 12px", fontSize: 14 }} onClick={() => {
                    if (!newGearInput.group.trim()) return;
                    const id = "custom-" + Date.now();
                    saveGearList([...gearList, { id, item: newGearInput.group.trim(), defaultClaimers: [] }], gearListPersonal);
                    setNewGearInput(prev => ({ ...prev, group: "" }));
                  }}>+ Add</button>
                </div>
              </div>

              {/* Personal Gear — editable */}
              <div className="card">
                <div style={{ padding: "12px 16px 10px", borderBottom: "1px solid var(--border)" }}>
                  <div className="display" style={{ fontSize: 15, fontWeight: 600 }}>🎒 Personal Gear List</div>
                </div>
                {gearListPersonal.map((item, i) => {
                  const isEditing = editingGear?.type === "personal" && editingGear?.id === i;
                  return (
                    <div key={i} style={{ padding: "9px 16px", borderBottom: i < gearListPersonal.length-1 ? "1px solid var(--border)" : "none" }}>
                      {isEditing ? (
                        <div style={{ display: "flex", gap: 6 }}>
                          <input
                            value={editingGear.value}
                            onChange={e => setEditingGear(prev => ({ ...prev, value: e.target.value }))}
                            style={{ flex: 1, background: "#f5f0e8", border: "1px solid var(--border)", borderRadius: 6, padding: "6px 10px", fontSize: 14 }}
                            autoFocus
                          />
                          <button className="btn btn-pine" style={{ padding: "6px 10px", fontSize: 14 }} onClick={() => {
                            const updated = gearListPersonal.map((x, idx) => idx === i ? editingGear.value : x);
                            saveGearList(gearList, updated);
                            setEditingGear(null);
                          }}>Save</button>
                          <button className="btn btn-ghost" style={{ padding: "6px 10px", fontSize: 14 }} onClick={() => setEditingGear(null)}>✕</button>
                        </div>
                      ) : (
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                          <div style={{ fontSize: 14 }}>{item}</div>
                          <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                            <button className="btn btn-ghost" style={{ padding: "4px 10px", fontSize: 14 }}
                              onClick={() => setEditingGear({ type: "personal", id: i, value: item })}>Edit</button>
                            <button className="btn" style={{ padding: "4px 10px", fontSize: 14, background: "#fde8e8", border: "1px solid #f0b0b0", color: "#9a2020" }}
                              onClick={() => {
                                if (!window.confirm(`Remove "${item}" from the personal list?`)) return;
                                saveGearList(gearList, gearListPersonal.filter((_, idx) => idx !== i));
                              }}>✕</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {/* Add new personal item */}
                <div style={{ padding: "10px 16px", borderTop: "1px solid var(--border)", display: "flex", gap: 6 }}>
                  <input
                    value={newGearInput.personal}
                    onChange={e => setNewGearInput(prev => ({ ...prev, personal: e.target.value }))}
                    placeholder="Add personal item…"
                    style={{ flex: 1, background: "#f5f0e8", border: "1px solid var(--border)", borderRadius: 6, padding: "7px 10px", fontSize: 14 }}
                    onKeyDown={e => {
                      if (e.key === "Enter" && newGearInput.personal.trim()) {
                        saveGearList(gearList, [...gearListPersonal, newGearInput.personal.trim()]);
                        setNewGearInput(prev => ({ ...prev, personal: "" }));
                      }
                    }}
                  />
                  <button className="btn btn-pine" style={{ padding: "7px 12px", fontSize: 14 }} onClick={() => {
                    if (!newGearInput.personal.trim()) return;
                    saveGearList(gearList, [...gearListPersonal, newGearInput.personal.trim()]);
                    setNewGearInput(prev => ({ ...prev, personal: "" }));
                  }}>+ Add</button>
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
