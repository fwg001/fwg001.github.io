async function sbFetch(path, options = {}) {
  const { prefer, headers: extraHeaders, ...fetchOptions } = options;
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
    ...fetchOptions,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": prefer !== undefined ? prefer : "return=representation",
      ...extraHeaders,
    },
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error("Supabase " + res.status + ": " + err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// Build in-memory appState shape from Supabase rows
function buildAppState(mealRows, claimRows) {
  // Meals: start from defaults, overlay DB rows
  const meals = Object.fromEntries(MEALS.filter(m => !m.infoOnly).map(m => [
    m.id,
    {
      chef: m.defaultChef ? { name: m.defaultChef, phone: ROSTER.find(r=>r.name===m.defaultChef)?.dbPhone || "seed" } : null,
      helper: m.defaultHelper ? { name: m.defaultHelper, phone: ROSTER.find(r=>r.name===m.defaultHelper)?.dbPhone || "seed" } : null,
      helper2: null,
      menu: m.menu,
    }
  ]));
  mealRows.forEach(row => {
    meals[row.meal_id] = {
      chef: row.chef_name ? { name: row.chef_name, phone: row.chef_phone } : null,
      helper: row.helper_name ? { name: row.helper_name, phone: row.helper_phone } : null,
      helper2: row.helper2_name ? { name: row.helper2_name, phone: row.helper2_phone } : null,
      menu: row.menu || "",
    };
  });

  // Claims: group by gear_id
  const claims = {};
  claimRows.forEach(row => {
    if (!claims[row.gear_id]) claims[row.gear_id] = [];
    claims[row.gear_id].push({ name: row.user_name, phone: row.user_phone });
  });

  return { meals, claims };
}

function formatPhone(raw) {
  const d = raw.replace(/\D/g, "");
  if (d.length <= 3) return d;
  if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
  const base = `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6,10)}`;
  return d.length > 10 ? base + d.slice(10) : base;
}

function exportCSV(mealState, claimState, gearList) {

  rows.push([]);

  a.href = url; a.download = "sunset-beach-camp.csv"; a.click();
  URL.revokeObjectURL(url);
}

function Countdown() {
  const target = new Date("2026-06-11T15:00:00");
  const [timeLeft, setTimeLeft] = useState(getTimeLeft());

  function getTimeLeft() {
    const diff = target - new Date();
    if (diff <= 0) return null;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const secs = Math.floor((diff % (1000 * 60)) / 1000);
    return { days, hours, mins, secs };
  }

  useEffect(() => {
    const timer = setInterval(() => setTimeLeft(getTimeLeft()), 1000);
    return () => clearInterval(timer);
  }, []);

  if (!timeLeft) return (
    <div style={{ marginTop: 12, color: "#f2e8d5", fontSize: 16, fontWeight: 600 }}>🏕️ We're camping!</div>
  );

  const { days, hours, mins, secs } = timeLeft;
  return (
    <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
      {[["days", days], ["hrs", hours], ["min", mins], ["sec", secs]].map(([label, val]) => (
        <div key={label} style={{
          background: "rgba(255,255,255,0.15)", borderRadius: 10,
          padding: "10px 14px", textAlign: "center", flex: 1,
        }}>
          <div style={{ color: "#f2e8d5", fontSize: 36, fontWeight: 700, lineHeight: 1, fontFamily: "'Playfair Display', serif" }}>
            {String(val).padStart(2, "0")}
          </div>
          <div style={{ color: "rgba(242,232,213,0.75)", fontSize: 14, marginTop: 4, letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 600 }}>
            {label}
          </div>
        </div>
      ))}
    </div>
  );
}

                  return (
                    <div key={r.phone} style={{ padding: "10px 16px", borderBottom: i < arr.length-1 ? "1px solid var(--border)" : "none" }}>
                      <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <div style={{ fontSize: 14, fontWeight: 600 }}>{r.name} {r.admin ? "⭐" : ""}</div>
                        <span className="tag tag-ocean">{r.adults + r.kids} ppl</span>
                      </div>
                      <div style={{ fontSize: 14, color: "var(--muted)", marginTop: 2 }}>
                        📱 {formatPhone(r.dbPhone)} · {r.adults} adult{r.adults!==1?"s/teens":"/teen"}, {r.kids} kid{r.kids!==1?"s":""}
                      </div>
                      {subs.map(s => (
                        <div key={s.phone} style={{ fontSize: 14, color: "var(--ocean)", marginTop: 4 }}>
                          ↳ {s.name} · 📱 {formatPhone(s.dbPhone)}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>

              {/* All meal signups */}
              <div className="card">
                <div style={{ padding: "12px 16px 10px", borderBottom: "1px solid var(--border)" }}>
                  <div className="display" style={{ fontSize: 15, fontWeight: 600 }}>Meal Sign-ups</div>
                </div>
                {MEALS.filter(m => !m.infoOnly).map((m, i) => {
                  const slot = appState.meals[m.id];
                  const rosterNames = ["—", ...ROSTER.filter(r => r.status === "confirmed" && r.type !== "guest").map(r => r.name)];
                  const roles = m.noChef
                    ? [["helper","Helper 1"], ["helper2","Helper 2"]]
                    : m.hasHelper2
                    ? [["chef","Chef"], ["helper","Helper 1"], ["helper2","Helper 2"]]
                    : [["chef","Chef"], ["helper","Helper 1"]];

                  return (
                    <div key={m.id} style={{ padding: "12px 16px", borderBottom: i < MEALS.length-1 ? "1px solid var(--border)" : "none" }}>
                      <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 8 }}>{m.icon} {m.label}</div>
                      <div style={{ display: "grid", gridTemplateColumns: roles.length === 3 ? "1fr 1fr 1fr" : "1fr 1fr", gap: 8 }}>
                        {roles.map(([role, label]) => {
                          const person = slot?.[role];
                          return (
                            <div key={role}>
                              <div style={{ fontSize: 14, color: "var(--muted)", fontWeight: 600, marginBottom: 4 }}>{label}</div>
                              <select
                                value={person?.name || "—"}
                                onChange={async e => {
                                  const name = e.target.value;
                                  const found = ROSTER.find(r => r.name === name);
                                  const newPerson = name === "—" ? null : { name, phone: found?.phone || "" };
                                  const newSlot = { ...slot, [role]: newPerson };
                                  saveState({ ...appState, meals: { ...appState.meals, [m.id]: newSlot } });
                                  try {
                                    await sbFetch("meal_signups", {
                                      method: "POST",
                                      prefer: "resolution=merge-duplicates,return=representation",
                                      body: JSON.stringify({
                                        meal_id: m.id,
                                        chef_name: newSlot.chef?.name || null,
                                        chef_phone: newSlot.chef?.phone || null,
                                        helper_name: newSlot.helper?.name || null,
                                        helper_phone: newSlot.helper?.phone || null,
                                        helper2_name: newSlot.helper2?.name || null,
                                        helper2_phone: newSlot.helper2?.phone || null,
                                        menu: newSlot.menu || null,
                                        updated_at: new Date().toISOString(),
                                      }),
                                    });
                                    showToast(`${label} updated!`);
                                  } catch(e) { showToast("Save failed", "error"); }
                                }}
                                style={{
                                  width: "100%", background: person ? "#edf6ee" : "#f8f6f2",
                                  border: `1.5px solid ${person ? "#b0d8b8" : "var(--border)"}`,
                                  borderRadius: 8, padding: "7px 10px", fontSize: 14,
                                  color: person ? "var(--pine)" : "var(--muted)",
                                  fontWeight: person ? 600 : 400,
                                  fontFamily: "'Source Sans 3', sans-serif",
                                }}
                              >
                                {rosterNames.map(n => <option key={n} value={n}>{n}</option>)}
                              </select>
                            </div>
                          );
                        })}
                      </div>
                      {slot?.menu && <div style={{ fontSize: 14, color: "var(--sunset)", marginTop: 6 }}>🍽 {slot.menu}</div>}
                    </div>
                  );
                })}
              </div>

              {/* Shared Gear — editable */}
              <div className="card">
                <div style={{ padding: "12px 16px 10px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div className="display" style={{ fontSize: 15, fontWeight: 600 }}>🏕️ Shared Gear List</div>
                  <span className="tag tag-pine">{gearList.filter(g=>(appState.claims[g.id]||[]).length>0).length}/{gearList.length} claimed</span>
                </div>
                {gearList.map((g, i) => {
                  const claimers = appState.claims[g.id] || [];
                  const isEditing = editingGear?.type === "group" && editingGear?.id === g.id;
                  return (
                    <div key={g.id} style={{ padding: "9px 16px", borderBottom: i < gearList.length-1 ? "1px solid var(--border)" : "none" }}>
                      {isEditing ? (
                        <div style={{ display: "flex", gap: 6 }}>
                          <input
                            value={editingGear.value}
                            onChange={e => setEditingGear(prev => ({ ...prev, value: e.target.value }))}
                            style={{ flex: 1, background: "#f5f0e8", border: "1px solid var(--border)", borderRadius: 6, padding: "6px 10px", fontSize: 14 }}
                            autoFocus
                          />
                          <button className="btn btn-pine" style={{ padding: "6px 10px", fontSize: 14 }} onClick={() => {
                            const updated = gearList.map(x => x.id === g.id ? { ...x, item: editingGear.value } : x);
                            saveGearList(updated, gearListPersonal);
                            setEditingGear(null);
                          }}>Save</button>
                          <button className="btn btn-ghost" style={{ padding: "6px 10px", fontSize: 14 }} onClick={() => setEditingGear(null)}>✕</button>
                        </div>
                      ) : (
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                          <div>
                            <div style={{ fontSize: 14, fontWeight: 600 }}>{g.item}</div>
                            {claimers.length > 0 && (
                              <div style={{ fontSize: 14, color: "var(--pine)", marginTop: 2 }}>
                                {claimers.map(c => c.name).join(", ")}
                              </div>
                            )}
                            {claimers.length === 0 && <div style={{ fontSize: 14, color: "var(--muted)", fontStyle: "italic" }}>Unclaimed</div>}
                          </div>
                          <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                            <button className="btn btn-ghost" style={{ padding: "4px 10px", fontSize: 14 }}
                              onClick={() => setEditingGear({ type: "group", id: g.id, value: g.item })}>Edit</button>
                            <button className="btn" style={{ padding: "4px 10px", fontSize: 14, background: "#fde8e8", border: "1px solid #f0b0b0", color: "#9a2020" }}
                              onClick={() => {
                                if (!window.confirm(`Remove "${g.item}" from the gear list?`)) return;
                                const updated = gearList.filter(x => x.id !== g.id);
                                saveGearList(updated, gearListPersonal);
                              }}>✕</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {/* Add new group item */}
                <div style={{ padding: "10px 16px", borderTop: "1px solid var(--border)", display: "flex", gap: 6 }}>
                  <input
                    value={newGearInput.group}
                    onChange={e => setNewGearInput(prev => ({ ...prev, group: e.target.value }))}
                    placeholder="Add group item…"
                    style={{ flex: 1, background: "#f5f0e8", border: "1px solid var(--border)", borderRadius: 6, padding: "7px 10px", fontSize: 14 }}
                    onKeyDown={e => {
                      if (e.key === "Enter" && newGearInput.group.trim()) {
                        const id = "custom-" + Date.now();
                        saveGearList([...gearList, { id, item: newGearInput.group.trim(), defaultClaimers: [] }], gearListPersonal);
                        setNewGearInput(prev => ({ ...prev, group: "" }));
                      }
                    }}
                  />
                  <button className="btn btn-pine" style={{ padding: "7px 12px", fontSize: 14 }} onClick={() => {
                    if (!newGearInput.group.trim()) return;
                    const id = "custom-" + Date.now();
                    saveGearList([...gearList, { id, item: newGearInput.group.trim(), defaultClaimers: [] }], gearListPersonal);
                    setNewGearInput(prev => ({ ...prev, group: "" }));
                  }}>+ Add</button>
                </div>
              </div>

              {/* Personal Gear — editable */}
              <div className="card">
                <div style={{ padding: "12px 16px 10px", borderBottom: "1px solid var(--border)" }}>
                  <div className="display" style={{ fontSize: 15, fontWeight: 600 }}>🎒 Personal Gear List</div>
                </div>
                {gearListPersonal.map((item, i) => {
                  const isEditing = editingGear?.type === "personal" && editingGear?.id === i;
                  return (
                    <div key={i} style={{ padding: "9px 16px", borderBottom: i < gearListPersonal.length-1 ? "1px solid var(--border)" : "none" }}>
                      {isEditing ? (
                        <div style={{ display: "flex", gap: 6 }}>
                          <input
                            value={editingGear.value}
                            onChange={e => setEditingGear(prev => ({ ...prev, value: e.target.value }))}
                            style={{ flex: 1, background: "#f5f0e8", border: "1px solid var(--border)", borderRadius: 6, padding: "6px 10px", fontSize: 14 }}
                            autoFocus
                          />
                          <button className="btn btn-pine" style={{ padding: "6px 10px", fontSize: 14 }} onClick={() => {
                            const updated = gearListPersonal.map((x, idx) => idx === i ? editingGear.value : x);
                            saveGearList(gearList, updated);
                            setEditingGear(null);
                          }}>Save</button>
                          <button className="btn btn-ghost" style={{ padding: "6px 10px", fontSize: 14 }} onClick={() => setEditingGear(null)}>✕</button>
                        </div>
                      ) : (
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                          <div style={{ fontSize: 14 }}>{item}</div>
                          <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                            <button className="btn btn-ghost" style={{ padding: "4px 10px", fontSize: 14 }}
                              onClick={() => setEditingGear({ type: "personal", id: i, value: item })}>Edit</button>
                            <button className="btn" style={{ padding: "4px 10px", fontSize: 14, background: "#fde8e8", border: "1px solid #f0b0b0", color: "#9a2020" }}
                              onClick={() => {
                                if (!window.confirm(`Remove "${item}" from the personal list?`)) return;
                                saveGearList(gearList, gearListPersonal.filter((_, idx) => idx !== i));
                              }}>✕</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {/* Add new personal item */}
                <div style={{ padding: "10px 16px", borderTop: "1px solid var(--border)", display: "flex", gap: 6 }}>
                  <input
                    value={newGearInput.personal}
                    onChange={e => setNewGearInput(prev => ({ ...prev, personal: e.target.value }))}
                    placeholder="Add personal item…"
                    style={{ flex: 1, background: "#f5f0e8", border: "1px solid var(--border)", borderRadius: 6, padding: "7px 10px", fontSize: 14 }}
                    onKeyDown={e => {
                      if (e.key === "Enter" && newGearInput.personal.trim()) {
                        saveGearList(gearList, [...gearListPersonal, newGearInput.personal.trim()]);
                        setNewGearInput(prev => ({ ...prev, personal: "" }));
                      }
                    }}
                  />
                  <button className="btn btn-pine" style={{ padding: "7px 12px", fontSize: 14 }} onClick={() => {
                    if (!newGearInput.personal.trim()) return;
                    saveGearList(gearList, [...gearListPersonal, newGearInput.personal.trim()]);
                    setNewGearInput(prev => ({ ...prev, personal: "" }));
                  }}>+ Add</button>
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
